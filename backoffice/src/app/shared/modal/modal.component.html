<div *ngIf="visible" class="fixed inset-0 z-50 flex items-center justify-center">
  <div class="absolute inset-0 bg-black bg-opacity-50" (click)="onBackdropClick($event)"></div>
  <div class="relative bg-white rounded-lg shadow-lg max-w-2xl w-full mx-4 max-h-[90vh] flex flex-col">
    <div class="flex items-start justify-between p-4 border-b flex-shrink-0">
      <h3 class="text-lg font-semibold">{{ title }}</h3>
      <button (click)="close()" aria-label="Fermer" class="text-gray-500 hover:text-gray-700">
        ✕
      </button>
    </div>

    <div class="p-4 overflow-y-auto flex-1">
      <ng-content></ng-content>
    </div>
  </div>
</div>
