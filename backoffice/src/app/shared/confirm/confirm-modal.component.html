<div *ngIf="visible" class="fixed inset-0 z-50 flex items-center justify-center">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black bg-opacity-50"></div>

  <!-- Modal dialog -->
  <div class="relative bg-white rounded-lg shadow-lg max-w-lg w-full mx-4">
    <div class="flex items-start justify-between p-4 border-b">
      <h3 class="text-lg font-semibold">Confirmer</h3>
      <button (click)="cancel()" aria-label="Fermer" class="text-gray-500 hover:text-gray-700">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
        </svg>
      </button>
    </div>

    <div class="p-4">
      <p class="text-sm text-gray-700">{{ message }}</p>
    </div>

    <div class="flex items-center justify-end gap-3 p-4 border-t">
      <button (click)="cancel()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded hover:bg-gray-200">Annuler</button>
      <button (click)="ok()" class="px-4 py-2 bg-primary-600 text-white rounded hover:bg-primary-700">Confirmer</button>
    </div>
  </div>
</div>
