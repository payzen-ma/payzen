<div class="p-6 max-w-7xl mx-auto">
  <div class="mb-8 flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Permissions</h1>
      <p class="text-sm text-gray-500">Liste de toutes les permissions disponibles dans le système</p>
    </div>
    <button
      (click)="onAddPermission()"
      class="inline-flex items-center gap-2 px-4 py-2 bg-primary-500 text-white rounded-md hover:bg-primary-600 transition">
      +
      Ajouter une permission
    </button>
  </div>

  <app-add-permission-modal *ngIf="showModal" [permission]="selectedPermission" (add)="handleAddPermission($event)" (update)="handleUpdatePermission($event)" (cancel)="handleCancelAdd()"></app-add-permission-modal>

  <!-- Notifications -->
  <div class="fixed top-4 right-4 z-50 space-y-2">
    <div *ngFor="let n of notifications" class="px-4 py-2 rounded shadow" [ngClass]="{
      'bg-green-100 text-green-800': n.type === 'success',
      'bg-red-100 text-red-800': n.type === 'error',
      'bg-blue-100 text-blue-800': n.type === 'info'
    }">{{ n.message }}</div>
  </div>

  <div *ngIf="isLoading" class="bg-white rounded-lg shadow-sm border border-gray-200 p-8">
    <div class="flex items-center justify-center">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary-500"></div>
      <span class="ml-3 text-gray-600">Chargement...</span>
    </div>
  </div>

  <div class="space-y-6">
    <div *ngFor="let resource of getResourceKeys()" class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
      <div class="px-6 py-4 bg-gray-50 border-b border-gray-200">
        <h2 class="text-lg font-semibold text-gray-900">{{ resource }}</h2>
      </div>
      
      <div class="p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <div *ngFor="let permission of permissionsByResource[resource]" class="flex items-start gap-3 p-4 border border-gray-200 rounded-lg hover:bg-gray-50 transition">
            <div class="flex-shrink-0 mt-1">
              <div class="w-2 h-2 bg-primary-500 rounded-full"></div>
            </div>
            <div>
              <div class="font-medium text-gray-900">{{ permission.name }}</div>
              <div class="text-xs text-gray-500 mt-1">Action: <span class="font-medium text-gray-700">{{ permission.action || '—' }}</span></div>
              <div class="text-sm text-gray-500 mt-2">{{ permission.description }}</div>
            </div>
            <div class="ml-auto flex items-center gap-2">
              <button class="p-1 rounded hover:bg-gray-100" title="Modifier" (click)="onEditPermission(permission)">
                <!-- pencil icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5h6m-3 0v6M5 20l7-7"/></svg>
              </button>
              <button class="p-1 rounded hover:bg-gray-100 text-red-600" title="Supprimer" (click)="onDeletePermission(permission)">
                <!-- trash icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-1 12a2 2 0 01-2 2H8a2 2 0 01-2-2L5 7m5 4v6m4-6v6M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
