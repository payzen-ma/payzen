<div class="min-h-screen flex items-center justify-center
            bg-gradient-to-tl from-surface-50 to-white px-4">

  <div class="w-full max-w-md">

    <div class="bg-white rounded-xl shadow-xl p-8">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="flex justify-center mb-4">
          <div class="bg-primary-500 text-white font-bold text-2xl px-4 py-2 rounded-md">
            PayZen
          </div>
        </div>

        <h1 class="text-3xl font-bold text-primary-600 mb-2">
          Bienvenue
        </h1>
        <p class="text-sm text-gray-600">
          Connectez-vous pour continuer
        </p>
      </div>

      <!-- Error Message -->
      <div *ngIf="error()" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg">
        <p class="text-sm text-red-600">{{ error() }}</p>
      </div>

      <!-- Form -->
      <form #loginForm="ngForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Adresse email</label>
          <input
            type="email"
            placeholder="admin@payzen.com"
            [(ngModel)]="email"
            name="email"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
          <input
            type="password"
            placeholder="••••••••"
            [(ngModel)]="password"
            name="password"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent" />
        </div>

        <button
          type="submit"
          [disabled]="loginForm.invalid || isLoading()"
          class="w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold py-2 px-4 rounded-lg transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed">
          {{ isLoading() ? 'Connexion…' : 'Se connecter' }}
        </button>
      </form>

    </div>

  </div>
</div>
