<div class="max-w-7xl mx-auto px-6 py-6">
  <p-toast />

  <div class="card">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-semibold">{{ 'overtime.hr.title' | translate }}</h2>
    </div>

    <p-table [value]="employees()" [loading]="isLoading()" styleClass="p-datatable-sm">
      <ng-template pTemplate="header">
        <tr>
          <th>{{ 'employees.name' | translate }}</th>
          <th>{{ 'employees.position' | translate }}</th>
          <th>{{ 'employees.department' | translate }}</th>
          <th>{{ 'common.actions' | translate }}</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-emp>
        <tr>
          <td>{{ emp.firstName }} {{ emp.lastName }}</td>
          <td>{{ emp.position }}</td>
          <td>{{ emp.department }}</td>
          <td>
            <p-button icon="pi pi-plus" (onClick)="openDeclare(emp)" [label]="'overtime.hr.declare' | translate"></p-button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <p-dialog [(visible)]="showDialog" [modal]="true" [style]="{width: '600px'}" header="{{ 'overtime.hr.declareDialog' | translate }}">
    <form [formGroup]="overtimeForm" class="space-y-3">
      <div>
        <label class="form-label">{{ 'overtime.form.date' | translate }}</label>
        <p-datepicker formControlName="overtimeDate" [showIcon]="true" dateFormat="dd/mm/yy"></p-datepicker>
      </div>

      <div>
        <label class="form-label">{{ 'overtime.form.startTime' | translate }}</label>
        <input type="time" formControlName="startTime" class="p-inputtext w-full" step="3600" />
      </div>

      <div>
        <label class="form-label">{{ 'overtime.form.endTime' | translate }}</label>
        <input type="time" formControlName="endTime" class="p-inputtext w-full" step="3600" />
      </div>

      <div>
        <label class="form-label">{{ 'overtime.form.reason' | translate }}</label>
        <textarea formControlName="reason" class="p-inputtextarea w-full" rows="3"></textarea>
      </div>

      <div class="flex justify-end gap-2">
        <p-button label="{{ 'common.cancel' | translate }}" severity="secondary" (onClick)="closeDialog()"></p-button>
        <p-button label="{{ 'common.save' | translate }}" (onClick)="submitDeclare()"></p-button>
      </div>
    </form>
  </p-dialog>
</div>
