<div class="max-w-7xl mx-auto px-6 py-6">
  <p-toast />

  <div class="card">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-semibold">{{ 'overtime.hr.title' | translate }}</h2>
    </div>

    <p-table [value]="employees()" [loading]="isLoading()" styleClass="p-datatable-sm" [paginator]="true" [rows]="5" [rowsPerPageOptions]="[5,10,25,50]">
      <ng-template pTemplate="header">
        <tr>
          <th>{{ 'employees.name' | translate }}</th>
          <th>{{ 'employees.position' | translate }}</th>
          <th>{{ 'employees.department' | translate }}</th>
          <th>{{ 'common.actions' | translate }}</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-emp>
        <tr class="saas-table-row cursor-pointer" (click)="viewEmployee(emp)">
          <td>{{ emp.firstName }} {{ emp.lastName }}</td>
          <td>{{ emp.position }}</td>
          <td>{{ emp.department }}</td>
          <td>
            <p-button icon="pi pi-plus" (onClick)="openDeclare(emp); $event.stopPropagation()" [label]="'overtime.hr.declare' | translate"></p-button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  </div>
