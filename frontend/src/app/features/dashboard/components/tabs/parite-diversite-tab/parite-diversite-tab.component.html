<section class="space-y-6">
  <app-section-header
    [eyebrow]="data().meta.eyebrow ?? ''"
    [title]="data().meta.title"
    [subtitle]="data().meta.subtitle"
    [badge]="data().meta.badge ?? ''"
    [icon]="data().meta.icon ?? 'pi pi-balance-scale'"
  />

  <div class="grid grid-cols-1 gap-4 lg:grid-cols-3">
    @for (metric of data().kpis; track metric.label) {
      <app-kpi-card [metric]="metric" />
    }
  </div>

  <div class="grid grid-cols-1 gap-4 xl:grid-cols-2">
    <article class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
      <h3 class="text-2xl font-semibold text-gray-900">Parite par departement</h3>
      <div class="mt-4 space-y-4">
        @for (row of data().pariteDepartement; track row.label) {
          <app-progress-row [row]="row" />
        }
      </div>
    </article>

    <article class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
      <h3 class="text-2xl font-semibold text-gray-900">Parite par niveau hierarchique</h3>
      <div class="mt-4 space-y-4">
        @for (row of data().pariteNiveauHierarchique; track row.label) {
          <app-progress-row [row]="row" />
        }
      </div>
    </article>
  </div>
</section>
