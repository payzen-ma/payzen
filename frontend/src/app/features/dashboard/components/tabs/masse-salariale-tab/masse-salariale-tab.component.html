<section class="space-y-6">
  <app-section-header
    [eyebrow]="data().meta.eyebrow ?? ''"
    [title]="data().meta.title"
    [subtitle]="data().meta.subtitle"
    [badge]="data().meta.badge ?? ''"
    [icon]="data().meta.icon ?? 'pi pi-wallet'"
  />

  <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4">
    @for (metric of data().kpis; track metric.label) {
      <app-kpi-card [metric]="metric" />
    }
  </div>

  <article class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
    <h3 class="text-2xl font-semibold text-gray-900">Masse salariale brute - 12 mois glissants (en K MAD)</h3>
    <div class="mt-4">
      <app-bar-chart [config]="data().masseBrute12Mois" />
    </div>
  </article>

  <article class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
    <h3 class="text-2xl font-semibold text-gray-900">Repartition masse salariale par departement</h3>
    <div class="mt-4 space-y-4">
      @for (row of data().repartitionDepartement; track row.label) {
        <app-progress-row [row]="row" />
      }
    </div>
  </article>
</section>
