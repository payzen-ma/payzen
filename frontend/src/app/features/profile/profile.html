<div class="profile-page p-6">
  <h1 class="text-2xl font-bold mb-6 text-gray-900">{{ 'profile.title' | translate }}</h1>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
    <p-card class="lg:col-span-2" [header]="'Mon profil'">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="text-sm text-gray-500">Nom complet</label>
          <div class="text-gray-900 font-medium mt-1">{{ fullName() }}</div>
        </div>
        <div>
          <label class="text-sm text-gray-500">Email</label>
          <div class="text-gray-900 font-medium mt-1">{{ user()?.email || '-' }}</div>
        </div>
        <div>
          <label class="text-sm text-gray-500">Role</label>
          <div class="text-gray-900 font-medium mt-1">{{ userRoleLabel() }}</div>
        </div>
        <div>
          <label class="text-sm text-gray-500">Workspace</label>
          <div class="text-gray-900 font-medium mt-1">{{ workspaceLabel() }}</div>
        </div>
        <div>
          <label class="text-sm text-gray-500">Societe</label>
          <div class="text-gray-900 font-medium mt-1">{{ user()?.companyName || '-' }}</div>
        </div>
        <div>
          <label class="text-sm text-gray-500">Employee ID</label>
          <div class="text-gray-900 font-medium mt-1">{{ user()?.employee_id || '-' }}</div>
        </div>
      </div>
    </p-card>

    <p-card [header]="'Actions rapides'">
      <div class="flex flex-col gap-2">
        <a class="profile-link-btn" routerLink="/app/dashboard">Aller au dashboard</a>
        @if (user()?.employee_id) {
          <a class="profile-link-btn" [routerLink]="['/app/employees', user()?.employee_id]">Voir ma fiche employe</a>
        }
        <a class="profile-link-btn" routerLink="/app/company">Parametres societe</a>
      </div>
    </p-card>
  </div>
</div>
