<div class="card">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container">
    
    <!-- Error Message -->
    @if (errorMessage()) {
      <div class="alert alert-error">
        <i class="pi pi-exclamation-circle"></i>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <!-- Company Details Section -->
    <section class="form-section">
      <div class="form-section-header">
        <h3 class="form-section-title">
          {{ 'company.info.title' | translate }}
        </h3>
        <p class="form-section-description">{{ 'company.info.subtitle' | translate }}</p>
      </div>
      
      <div class="form-grid">
        <!-- Company Name -->
        <div class="form-field">
          <label class="form-label form-label-required">
            {{ 'company.info.raisonSociale' | translate }}
          </label>
          <input pInputText formControlName="companyName" class="input" [class.ng-invalid]="form.get('companyName')?.invalid && form.get('companyName')?.touched"/>
          @if (form.get('companyName')?.invalid && form.get('companyName')?.touched) {
            <small class="form-error">{{ 'common.validation.required' | translate }}</small>
          }
        </div>

        <!-- ICE -->
        <div class="form-field">
          <label class="form-label">
            {{ 'company.info.ice' | translate }}
          </label>
          <input pInputText formControlName="ice" class="input" />
        </div>

        <!-- Email -->
        <div class="form-field">
          <label class="form-label form-label-required">
            {{ 'company.info.email' | translate }}
          </label>
          <input pInputText formControlName="email" class="input" />
        </div>

        <!-- Phone -->
        <div class="form-field">
          <label class="form-label form-label-required">
            {{ 'company.info.phone' | translate }}
          </label>
          <input pInputText formControlName="phone" class="input" />
        </div>

        <!-- CNSS -->
        <div class="form-field">
          <label class="form-label">
            {{ 'company.info.cnss' | translate }}
          </label>
          <input pInputText formControlName="cnss" class="input" />
        </div>

        <!-- Address -->
        <div class="form-field-full">
          <label class="form-label form-label-required">
            {{ 'company.info.address' | translate }}
          </label>
          <input pInputText formControlName="address" class="input" />
        </div>

        <!-- Country -->
        <div class="form-field">
          <app-select-field
            formControlName="countryId"
            label="Pays"
            [requiredMark]="true"
            [options]="countries()"
            optionLabel="label"
            optionValue="id"
            variant="autocomplete"
            [placeholder]="'Choisir un pays'"
            [showClear]="true"
            (searchQuery)="onCountrySearch($event)"
          ></app-select-field>
        </div>

        <!-- City -->
        <div class="form-field">
          <app-select-field
            formControlName="city"
            [label]="'company.info.city' | translate"
            [requiredMark]="true"
            [options]="getFilteredCities()"
            optionLabel="label"
            optionValue="label"
            variant="autocomplete"
            [creatable]="true"
            [createLabel]="'company.info.createCity' | translate"
            [placeholder]="'company.info.cityPlaceholder' | translate"
            [showClear]="true"
            (searchQuery)="onCitySearch($event)"
            (create)="onCreateCity($event)"
          ></app-select-field>
        </div>

        <!-- RC -->
        <div class="form-field">
          <label class="form-label">
            {{ 'company.info.rc' | translate }}
          </label>
          <input pInputText formControlName="rc" class="input" />
        </div>

        <!-- IF -->
        <div class="form-field">
          <label class="form-label">{{ 'company.info.identifiantFiscal' | translate }}</label>
          <input pInputText formControlName="if" class="input" />
        </div>

        <!-- RIB -->
        <div class="form-field">
          <label class="form-label">{{ 'company.info.rib' | translate }}</label>
          <input pInputText formControlName="rib" class="input" />
        </div>
      </div>
    </section>

    <!-- Actions -->
    <div class="form-actions">
      <button 
        pButton 
        type="button" 
        [label]="'common.cancel' | translate" 
        class="btn-secondary-outline" 
        (click)="onCancel()"
        [disabled]="isLoading()">
      </button>
      <button 
        pButton 
        type="submit" 
        [label]="mode === 'create' ? ('common.create' | translate) : ('common.save' | translate)" 
        class="btn-primary"
        [loading]="isLoading()">
      </button>
    </div>
  </form>
</div>
