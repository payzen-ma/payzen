<section class="min-h-screen flex items-center justify-center px-4 py-8 bg-(--bg-page)">
  <div class="card w-full max-w-md grid gap-6">
    <div class="text-center grid gap-2">
      <p class="text-sm font-semibold tracking-wide text-(--primary)">Payzen HR</p>
      <h1 class="heading">Bienvenue sur Payzen HR</h1>
      <p class="subheading">Connectez-vous avec votre compte Microsoft ou Google</p>
    </div>

    <div class="grid gap-3">
      <button
        type="button"
        class="btn w-full justify-center bg-white text-gray-800 border border-gray-300 hover:bg-gray-50"
        (click)="onMicrosoftLogin()">
        <svg width="21" height="21" viewBox="0 0 21 21" aria-hidden="true">
          <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
          <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
          <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
        </svg>
        Continuer avec Microsoft
      </button>

      <button
        type="button"
        class="btn w-full justify-center bg-white text-gray-800 border border-gray-300 hover:bg-gray-50"
        (click)="onGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64,9.2C17.64,8.46,17.58,7.92,17.45,7.36H9v3.32h4.84c-0.18,1.32-1.05,3.31-3.02,4.64l0.03,0.2l4.38,3.4l0.3,0.03C15.91,16.97,17.64,13.38,17.64,9.2"/>
          <path fill="#34A853" d="M9,18c2.43,0,4.47-0.8,5.96-2.18l-2.91-2.26c-0.8,0.54-1.83,0.91-3.05,0.91c-2.33,0-4.31-1.49-5.02-3.57l-0.2,0.02l-4.55,3.53l-0.07,0.18C1.18,16.73,4.77,18,9,18"/>
          <path fill="#FBBC05" d="M3.98,10.91C3.76,10.32,3.63,9.67,3.63,9s0.13-1.32,0.35-1.91l-0.01-0.21l-4.62-3.58l-0.17,0.08C0.47,5.04,0,6.95,0,9s0.47,3.96,1.18,5.62L3.98,10.91"/>
          <path fill="#EB4335" d="M9,3.58c1.32,0,2.21,0.57,2.72,1.05l2.04-1.99C12.46,1.08,10.43,0,9,0C4.77,0,1.18,2.27,0.38,5.38l3.6,2.8C4.69,6.08,6.67,3.58,9,3.58"/>
        </svg>
        Continuer avec Google
      </button>
    </div>

    <p class="text-xs text-(--text-secondary) text-center m-0">
      En vous connectant, vous acceptez nos
      <a href="/terms">Conditions d'utilisation</a> et notre
      <a href="/privacy">Politique de confidentialite</a>.
    </p>
  </div>
</section>
