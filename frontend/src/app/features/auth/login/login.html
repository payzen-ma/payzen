<div class="min-h-screen flex items-center justify-center bg-linear-to-tl to-white from-(--bg-page) px-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="flex justify-center mb-8">
      <div class="bg-(--primary) text-white rounded-xl text-2xl font-bold px-5 py-2 tracking-tight">
        PayZen
      </div>
    </div>

    <div class="bg-white border border-(--border-color-subtle) rounded-2xl shadow-sm px-8 py-8 flex flex-col gap-5">

      <h1 class="text-2xl font-bold text-(--text-primary) text-center">Connexion</h1>

      <!-- Erreur -->
      @if (error()) {
        <div role="alert"
             class="flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">
          <span class="pi pi-times-circle flex-shrink-0"></span>
          <span>{{ error() }}</span>
        </div>
      }

      <!-- Email -->
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-(--text-primary)">Email</label>
        <input
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          (keyup.enter)="onSignIn()"
          placeholder="vous@exemple.com"
          autocomplete="email"
          class="w-full border border-(--border-color-medium) rounded-lg px-4 py-2.5 text-sm
                 focus:outline-none focus:ring-2 focus:ring-(--primary)/30 focus:border-(--primary)"
        />
      </div>

      <!-- Mot de passe -->
      <div class="flex flex-col gap-1.5">
        <div class="flex items-center justify-between">
          <label class="text-sm font-medium text-(--text-primary)">Mot de passe</label>
          <a href="/forgot-password"
             class="text-xs text-(--primary) hover:underline">
            Mot de passe oublié ?
          </a>
        </div>
        <div class="relative">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            (keyup.enter)="onSignIn()"
            placeholder="••••••••"
            autocomplete="current-password"
            class="w-full border border-(--border-color-medium) rounded-lg px-4 py-2.5 text-sm pr-10
                   focus:outline-none focus:ring-2 focus:ring-(--primary)/30 focus:border-(--primary)"
          />
          <button type="button" (click)="togglePassword()"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-(--text-muted) hover:text-(--text-primary)">
            <span [class]="showPassword() ? 'pi pi-eye-slash' : 'pi pi-eye'" class="text-sm"></span>
          </button>
        </div>
      </div>

      <!-- Bouton connexion -->
      <button type="button" (click)="onSignIn()" [disabled]="isLoading()"
        class="w-full flex items-center justify-center gap-2 bg-(--primary) hover:bg-(--primary-hover)
               text-white font-semibold rounded-lg py-3 text-sm transition-colors
               disabled:opacity-60 disabled:cursor-not-allowed cursor-pointer">
        @if (isLoading()) { <span class="pi pi-spin pi-spinner text-base"></span> }
        Se connecter
      </button>

      <!-- Séparateur -->
      <div class="flex items-center gap-3">
        <hr class="flex-1 border-(--border-color-subtle)" />
        <span class="text-xs text-(--text-muted) whitespace-nowrap">ou</span>
        <hr class="flex-1 border-(--border-color-subtle)" />
      </div>

      <!-- Google (redirect via Entra) -->
      <button type="button" (click)="onGoogleSignIn()"
        class="w-full flex items-center justify-center gap-3 border border-(--border-color-medium)
               rounded-lg py-2.5 text-sm font-medium text-(--text-primary)
               hover:bg-(--bg-hover) transition-colors cursor-pointer">
        <!-- Logo Google SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M1.24 6.68C1.98 5.13 3.03 3.82 4.36 2.74 6.15 1.26 8.2.37 10.51.09c2.71-.32 5.25.18 7.6 1.6.58.35 1.13.75 1.65 1.18.13.1.12.16.01.27-1.07 1.06-2.14 2.13-3.2 3.2-.12.12-.19.11-.32 0C13.14 3.97 8.61 4.61 6.3 7.78c-.41.56-.74 1.16-.97 1.81-.02.06-.06.11-.09.17L1.24 6.68Z" fill="#E94335"/>
          <path d="M5.25 14.24c.21.45.38.92.64 1.35 1.09 1.78 2.64 2.93 4.68 3.34 1.85.37 3.62.12 5.27-.8.06-.03.11-.06.16-.09.03.03.06.07.09.09 1.24.96 2.48 1.92 3.71 2.88-.59.59-1.27 1.06-1.98 1.48-2.08 1.19-4.34 1.67-6.71 1.49-2.96-.23-5.51-1.4-7.62-3.5-.92-.92-1.69-1.97-2.23-3.16l5-3.78Z" fill="#34A853"/>
          <path d="M19.8 21.0c-1.24-.96-2.48-1.92-3.72-2.88-.03-.02-.06-.06-.09-.09.43-.33.87-.65 1.22-1.07.58-.7.97-1.49 1.17-2.37.02-.11 0-.15-.11-.15h-6.87c-.21 0-.26-.06-.26-.26V11.8c0-.18.05-.23.23-.23h11.72c.15 0 .19.04.19.19.29 1.32.27 2.64.09 3.97-.14 1.06-.4 2.09-.8 3.09-.59 1.47-1.46 2.75-2.6 3.85-.04.03-.08.06-.17.13Z" fill="#4285F3"/>
          <path d="M5.25 14.24c-.82.63-1.64 1.25-2.47 1.88-.51.39-1.02.78-1.54 1.17-.4-.74-.66-1.52-.87-2.32-.4-1.56-.46-3.14-.22-4.73.17-1.25.53-2.44 1.11-3.56.72.55 1.43 1.1 2.15 1.65.62.47 1.24.94 1.85 1.41-.11.51-.26 1.01-.31 1.53-.09.96 0 1.9.27 2.83.02.04.02.09.03.14Z" fill="#FABB06"/>
        </svg>
        Continuer avec Google
      </button>

      <!-- Lien inscription -->
      <p class="text-center text-sm text-(--text-muted)">
        Pas encore de compte ?
        <button type="button" (click)="goToSignUp()"
          class="text-(--primary) hover:underline font-medium ml-1 cursor-pointer">
          Créer un compte
        </button>
      </p>

    </div>
  </div>
</div>
