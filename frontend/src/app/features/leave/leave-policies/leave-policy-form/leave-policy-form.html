<div class="policy-page">
  <p-toast />

  @if (isLoading()) {
    <div class="policy-loading">
      <i class="pi pi-spin pi-spinner text-3xl"></i>
      <p>{{ 'common.loading' | translate }}</p>
    </div>
  } @else {
    <div class="policy-dialog">
      <div class="policy-dialog-header">
        <h2>Add Policy</h2>
        <button type="button" class="policy-close-btn" (click)="goBack()" [attr.aria-label]="'common.close' | translate">
          <i class="pi pi-times"></i>
        </button>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="policy-dialog-body">
        <div class="policy-field">
          <label>Type</label>
          <p-select
            [options]="leaveType() ? [{ label: getLeaveTypeName(), value: leaveType()!.Id }] : []"
            [placeholder]="'Select a leave type'"
            optionLabel="label"
            optionValue="value"
            [disabled]="true"
            styleClass="w-full policy-select"
          />
        </div>

        <div class="policy-field">
          <label>Accrual method</label>
          <p-select formControlName="accrualMethod" [options]="accrualMethodOptions" optionLabel="label" optionValue="value"
            styleClass="w-full policy-select" />
        </div>

        <div class="policy-grid-2">
          <div class="policy-field">
            <label>Days per month (Adult)</label>
            <input pInputText type="number" formControlName="daysPerMonth" class="policy-input"
              placeholder="Enter how many days for an adult" />
          </div>
          <div class="policy-field">
            <label>Days per month (Minor)</label>
            <input pInputText type="number" formControlName="daysPerMonthMinor" class="policy-input"
              placeholder="Enter how many days for a minor" />
          </div>
        </div>

        <div class="policy-grid-2">
          <div class="policy-field">
            <label>Bonus days after 5 years</label>
            <input pInputText type="number" formControlName="daysPerService5Years" class="policy-input" placeholder="Enter the bonus" />
          </div>
          <div class="policy-field">
            <label>Annual cap (days)</label>
            <input pInputText type="number" formControlName="annualCapDays" class="policy-input" placeholder="Enter the annual cap" />
          </div>
        </div>

        <div class="policy-field">
          <label>Minimum consecutive days</label>
          <input pInputText type="number" formControlName="minConsecutiveDays" class="policy-input"
            placeholder="Enter the minimum consecutive days" />
        </div>

        <div class="policy-checkboxes">
          <div class="policy-checkbox-item">
            <p-checkbox formControlName="requiresEligibility6Months" [binary]="true" inputId="requiresEligibility6Months" />
            <label for="requiresEligibility6Months">Requires 6 months seniority</label>
          </div>
          <div class="policy-checkbox-item">
            <p-checkbox formControlName="requiresBalance" [binary]="true" inputId="requiresBalance" />
            <label for="requiresBalance">Requires balance</label>
          </div>
          <div class="policy-checkbox-item">
            <p-checkbox formControlName="useWorkingCalendar" [binary]="true" inputId="useWorkingCalendar" />
            <label for="useWorkingCalendar">Use working calendar</label>
          </div>
        </div>

        <div class="policy-carryover-box">
          <div class="policy-checkbox-item">
            <p-checkbox formControlName="allowCarryover" [binary]="true" inputId="allowCarryover" />
            <label for="allowCarryover">Allow leave carryover</label>
          </div>
          @if (form.get('allowCarryover')?.value) {
            <div class="policy-field">
              <label>Maximum carryover years</label>
              <input pInputText type="number" formControlName="maxCarryoverYears" class="policy-input" />
            </div>
          }
        </div>

        <div class="policy-toggle-row">
          <p-toggleswitch formControlName="isEnabled" inputId="isEnabled"></p-toggleswitch>
          <label for="isEnabled">Policy enabled</label>
        </div>
      </form>

      <div class="policy-dialog-footer">
        <button pButton type="button" label="Cancel" class="policy-footer-cancel" (click)="goBack()" [disabled]="isSaving()"></button>
        <button pButton type="button" [label]="(isEditMode() || policy()) ? 'Save' : 'Create'" class="policy-footer-primary"
          icon="pi pi-plus" (click)="onSubmit()" [loading]="isSaving()" [disabled]="isSaving()"></button>
      </div>
    </div>
  }
</div>
